    text: "Аплікатура в органних перекладеннях — з урахуванням довших нот. Баяніст не знімає руку, як органіст.",
    detail: "Органіст може тримати ноту педаллю або другим мануалом, поки перша рука перекладається. Баяніст позбавлений цієї можливості. Тому в перекладеннях органних творів необхідно особливо ретельно планувати аплікатуру для довгих витриманих нот у поєднанні з рухливими голосами. Іноді доцільно використовувати підкладання пальця під ноту для збереження зв'язності."
  },
];

let cur = 0, todayIdx = 0;

function dayKey() { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function baseIndex() { const days=Math.floor((new Date()-new Date('2024-01-01'))/86400000); return days%BASE.length; }

function show(animate) {
  const tip = BASE[cur];
  const go = () => {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('tipContent').style.display = 'block';
    const tagEl = document.getElementById('tipTag');
    tagEl.textContent = tip.tag;
    tagEl.className = 'tag ' + tip.tagClass;
    document.getElementById('tipText').textContent = tip.text;
    document.getElementById('tipDetail').textContent = tip.detail;
    document.getElementById('counter').textContent = (cur+1) + ' / ' + BASE.length;
    document.getElementById('progressBar').style.width = ((cur+1)/BASE.length*100) + '%';
  };
  const card = document.getElementById('card');
  if (animate) {
    card.style.transition = 'opacity 0.2s, transform 0.2s';
    card.style.opacity = '0'; card.style.transform = 'translateY(6px)';
    setTimeout(() => { go(); card.style.opacity='1'; card.style.transform='translateY(0)'; }, 200);
  } else { go(); }
}

function nextTip() { cur=(cur+1)%BASE.length; show(true); }
function prevTip() { cur=(cur-1+BASE.length)%BASE.length; show(true); }
function goToday() { cur=todayIdx; show(true); }

function init() {
  document.getElementById('dateDisplay').textContent =
    new Date().toLocaleDateString('uk-UA',{weekday:'long',day:'numeric',month:'long'});
  cur = baseIndex(); todayIdx = cur; show(false);
}

init();
</script>
</body>
</html>
